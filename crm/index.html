<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA7WO6r3cbiZiJZVv82wF2SnCI5rRJRLkI",
  authDomain: "lionforce-crm.firebaseapp.com",
  databaseURL: "https://lionforce-crm-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "lionforce-crm",
  storageBucket: "lionforce-crm.firebasestorage.app",
  messagingSenderId: "951731260622",
  appId: "1:951731260622:web:9dedc08f62461add52949f"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
        <div class="sidebar-header"><span class="lion">🦁</span><div><h1>The Lion Force</h1><p>CRM Portal</p></div></div>
        <div class="user-info"><div class="user-avatar" id="sideAvatar">A</div><div><p id="sideName">Admin</p><span id="sideRole" style="font-size:.75rem;color:#888;text-transform:capitalize">admin</span></div></div>
        <nav class="nav">
          <button class="nav-item active" onclick="goPage('dashboard')" data-p="dashboard"><i class="fas fa-chart-line"></i> Dashboard</button>
          <button class="nav-item" onclick="goPage('interactions')" data-p="interactions"><i class="fas fa-comment-dots"></i> Log Interaction</button>
          <button class="nav-item" onclick="goPage('search')" data-p="search"><i class="fas fa-search"></i> Creator Search</button>
          <button class="nav-item" onclick="goPage('tasks')" data-p="tasks"><i class="fas fa-tasks"></i> Tasks</button>
          <button class="nav-item" onclick="goPage('admin')" data-p="admin" id="adminNav" style="display:none"><i class="fas fa-shield-alt"></i> Admin Panel</button>
        </nav>
        <div class="sidebar-footer"><button class="nav-item" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Sign Out</button></div>
      </div>
      <div class="main-content" id="mainContent"></div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="detailModal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header"><h3 id="modalTitle">Details</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

const REGIONS = ['United Kingdom','MENA','Turkey','CCA','Italy','France','Philippines','AU+','Germany','Netherlands','Malaysia','Japan','Brazil'];
const ADMIN_KEY = 'lionforce2024';

function hashPW(pw){let h=0;for(let i=0;i<pw.length;i++)h=((h<<5)-h+pw.charCodeAt(i))|0;return'h'+Math.abs(h).toString(16)}

let currentUser = null;
let allUsers = [];
let allInteractions = [];
let allTasks = [];

async function fbGet(path){const s=await get(ref(db,path));return s.exists()?s.val():null}
async function fbSet(path,val){await set(ref(db,path),val)}
async function fbUpdate(path,val){await update(ref(db,path),val)}

async function loadUsers(){const d=await fbGet('users');allUsers=d?Object.values(d):[];return allUsers}
async function loadInteractions(){const d=await fbGet('interactions');allInteractions=d?Object.values(d):[];return allInteractions}
async function loadTasks(){const d=await fbGet('tasks');allTasks=d?Object.values(d):[];return allTasks}

window.doLogin = async function(){
  const u=document.getElementById('loginUser').value.trim();
  const p=document.getElementById('loginPass').value;
  document.getElementById('loginError').innerHTML='<p style="color:#888;text-align:center">Loading...</p>';
  try{
    await loadUsers();
    const user=allUsers.find(x=>x.username===u&&x.password===hashPW(p));
    if(!user)throw new Error('Invalid username or password');
    if(user.isActive==='no')throw new Error('Account deactivated');
    currentUser={id:user.id,username:user.username,name:user.name,email:user.email,role:user.role};
    localStorage.setItem('lf_crm_user',JSON.stringify(currentUser));
    showApp();
  }catch(e){document.getElementById('loginError').innerHTML=`<div class="error-msg">${e.message}</div>`}
}

window.doRegister = async function(){
  const key=document.getElementById('regKey').value.trim();
  const name=document.getElementById('regName').value.trim();
  const username=document.getElementById('regUser').value.trim();
  const password=document.getElementById('regPass').value;
  const email=document.getElementById('regEmail').value.trim();
  if(key!==ADMIN_KEY){document.getElementById('regMsg').innerHTML='<div class="error-msg">Invalid admin key</div>';return}
  try{
    await loadUsers();
    if(allUsers.find(u=>u.username===username)){document.getElementById('regMsg').innerHTML='<div class="error-msg">Username exists</div>';return}
    const user={id:Date.now(),username,password:hashPW(password),name,email:email||null,role:'manager',isActive:'yes',createdAt:Date.now()};
    await fbSet('users/'+username,user);
    document.getElementById('regMsg').innerHTML='<div class="success-msg">Account created! Redirecting...</div>';
    setTimeout(()=>{showLogin();document.getElementById('loginUser').value=username},1500);
  }catch(e){document.getElementById('regMsg').innerHTML=`<div class="error-msg">${e.message}</div>`}
}

window.doLogout = function(){
  currentUser=null;localStorage.removeItem('lf_crm_user');
  document.getElementById('app').classList.remove('active');
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginBox').style.display='block';
  document.getElementById('registerBox').style.display='none';
  document.getElementById('adminNav').style.display='none';
}

window.showRegister = function(){
  document.getElementById('loginBox').style.display='none';
  document.getElementById('registerBox').style.display='block';
  document.getElementById('regMsg').innerHTML='';
}
window.showLogin = function(){
  document.getElementById('loginBox').style.display='block';
  document.getElementById('registerBox').style.display='none';
  document.getElementById('loginError').innerHTML='';
}

function showApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('app').classList.add('active');
  document.getElementById('headerName').textContent=currentUser.name;
  document.getElementById('headerAvatar').textContent=currentUser.name.charAt(0).toUpperCase();

  document.getElementById('sideRole').textContent=currentUser.role;
  document.getElementById('sideAvatar').textContent=currentUser.name.charAt(0).toUpperCase();
  if(currentUser.role==='admin')document.getElementById('adminNav').style.display='flex';

window.goPage = async function(page){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.querySelector(`.nav-item[data-p="${page}"]`)?.classList.add('active');
  const titles={dashboard:'Dashboard',interactions:'Log Interaction',search:'Creator Search',tasks:'Tasks',admin:'Admin Panel'};
  document.getElementById('pageTitle').textContent=titles[page]||page;
  const el=document.getElementById('mainContent');
  el.innerHTML='<div class="loading"><i class="fas fa-spinner fa-spin" style="font-size:2rem;color:#FF0050"></i><p style="margin-top:1rem">Loading...</p></div>';
  try{
    if(page==='dashboard')await pageDashboard(el);
    else if(page==='interactions')await pageInteractions(el);
    else if(page==='search')pageSearch(el);
    else if(page==='tasks')await pageTasks(el);
    else if(page==='admin')await pageAdmin(el);
  }catch(e){el.innerHTML=`<div class="error-msg">Error: ${e.message}</div>`}
}

window.closeSidebar = function(){

window.submitInt = async function(){
  const btn=document.querySelector('#intForm button');btn.textContent='Saving...';
  try{
    let managerId=currentUser.id,managerName=currentUser.name;
    const assignEl=document.getElementById('iAssign');
    if(assignEl&&assignEl.value){managerId=parseInt(assignEl.value);managerName=assignEl.options[assignEl.selectedIndex].getAttribute('data-n')||currentUser.name}
    const interaction={
      id:Date.now(),managerId,managerName,
      creatorUsername:document.getElementById('iUser').value.trim().replace(/^@/,''),
      region:document.getElementById('iRegion').value,
      issue:document.getElementById('iIssue').value.trim(),
      action:document.getElementById('iAction').value.trim(),
      status:document.getElementById('iStatus').value,
      notes:document.getElementById('iNotes').value.trim(),
      remarks:[],
      activityLog:[{type:'created',text:`Interaction logged${managerId!==currentUser.id?` and assigned to ${managerName}`:''}`,author:currentUser.name,time:Date.now()}],
      createdAt:Date.now()
    };
    await fbSet('interactions/int_'+interaction.id,interaction);
    document.getElementById('intMsg').innerHTML='<div class="success-msg"><i class="fas fa-check-circle"></i> Interaction logged successfully!</div>';
    document.getElementById('intForm').reset();
    setTimeout(()=>document.getElementById('intMsg').innerHTML='',3000);
  }catch(e){document.getElementById('intMsg').innerHTML=`<div class="error-msg">Error: ${e.message}</div>`}
  btn.textContent='Log Interaction';
}

window.doSearch = async function(){

    if(results.length===0){document.getElementById('sResults').innerHTML=`<div class="card"><div class="empty-state"><i class="fas fa-user-slash" style="font-size:3rem;color:#333;margin-bottom:1rem;display:block"></i><p>No interactions found for "@${username}"</p></div></div>`;return}

        <div><h3 style="margin:0">@${username}</h3><p style="color:#888;margin:0;font-size:.875rem">${results.length} interaction(s) · ${new Set(results.map(r=>r.managerName)).size} manager(s)</p></div>
      </div>
      ${sorted.map(i=>`<div class="list-item clickable-card" onclick="openIntModal(${i.id})" style="margin-bottom:.75rem">
        <div class="list-item-header"><span style="font-weight:700">@${i.creatorUsername}</span><span class="badge badge-gray">${i.region}</span><span class="badge badge-${i.status==='resolved'?'green':i.status==='pending'?'amber':'red'}">${i.status}</span><span style="color:#666;font-size:.75rem;margin-left:auto">${new Date(i.createdAt).toLocaleDateString()}</span></div>
        <p style="color:#888;font-size:.875rem;margin-top:.25rem"><strong style="color:#ccc">Manager:</strong> ${i.managerName||'Unknown'}</p>
        <p style="color:#aaa;font-size:.8rem;margin-top:.25rem"><strong>Issue:</strong> ${i.issue.substring(0,100)}${i.issue.length>100?'...':''}</p>
        <p style="color:#aaa;font-size:.8rem"><strong>Action:</strong> ${i.action.substring(0,100)}${i.action.length>100?'...':''}</p>
        ${i.remarks?.length?`<p style="font-size:.75rem;color:#FF0050;margin-top:.25rem"><i class="fas fa-comments"></i> ${i.remarks.length} remark(s)</p>`:''}
      </div>`).join('')}</div>`;
  }catch(e){document.getElementById('sResults').innerHTML=`<div class="error-msg">Error: ${e.message}</div>`}
}

window.showNewTask = async function(){
  await loadUsers();
  const managers=allUsers.filter(u=>u.role==='manager'&&u.isActive==='yes');
  document.getElementById('taskForm').innerHTML=`<div class="card" style="margin-bottom:1rem">
    <h3 style="margin-bottom:1rem">Create New Task</h3>
    <div id="taskMsg"></div>
    <div class="form-group"><label>Title *</label><input type="text" id="tTitle" required></div>
    <div class="form-group"><label>Description</label><textarea id="tDesc" style="min-height:60px"></textarea></div>
    <div class="form-row"><div class="form-group"><label>Assign To *</label><select id="tAssign" required><option value="">Select manager</option>${managers.map(m=>`<option value="${m.id}">${m.name}</option>`).join('')}</select></div><div class="form-group"><label>Priority</label><select id="tPri"><option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option></select></div></div>
    <div class="form-group"><label>Due Date</label><input type="date" id="tDue" style="color-scheme:dark"></div>
    <div style="display:flex;gap:.5rem"><button class="btn btn-sm btn-green" onclick="createTask()">Create Task</button><button class="btn btn-sm btn-secondary" onclick="document.getElementById('taskForm').innerHTML=''">Cancel</button></div>
  </div>`;

window.createTask = async function(){
  try{
    const assigneeId=parseInt(document.getElementById('tAssign').value);
    if(!assigneeId){document.getElementById('taskMsg').innerHTML='<div class="error-msg">Select a manager</div>';return}
    await loadUsers();
    const assignee=allUsers.find(u=>u.id===assigneeId);
    const task={id:Date.now(),title:document.getElementById('tTitle').value.trim(),description:document.getElementById('tDesc').value.trim(),assignedTo:assigneeId,assignedBy:currentUser.id,priority:document.getElementById('tPri').value,status:'open',dueDate:document.getElementById('tDue').value||null,remarks:[],activityLog:[{type:'created',text:`Task created and assigned to ${assignee?.name||'Unassigned'}`,author:currentUser.name,time:Date.now()}],createdAt:Date.now()};
    await fbSet('tasks/task_'+task.id,task);
    goPage('tasks');
  }catch(e){document.getElementById('taskMsg').innerHTML=`<div class="error-msg">${e.message}</div>`}
}

window.updateTaskStatus = async function(id,status){
  await loadTasks();
  const t=allTasks.find(x=>x.id===id);
  if(t){
    const oldStatus=t.status;
    const activityLog=[...(t.activityLog||[]),{type:'status',text:`Status changed from "${oldStatus.replace('_',' ')}" to "${status.replace('_',' ')}"`,author:currentUser.name,time:Date.now()}];
    await fbUpdate('tasks/task_'+id,{status,activityLog});
    openTaskModal(id);
  }
}

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
}

window.switchAdminTab = function(tabId){
  const tabNames = {mTab:'Managers',iTab:'All Interactions',cTab:'Create Manager'};
  const btnIndex = {mTab:0,iTab:1,cTab:2};
  const tabs = document.querySelectorAll('.tab-btn');
  const panels = document.querySelectorAll('.tab-panel');
  tabs.forEach(b=>b.classList.remove('active'));
  panels.forEach(p=>p.classList.remove('active'));
  const idx = btnIndex[tabId]||0;
  if(tabs[idx]) tabs[idx].classList.add('active');
  document.getElementById(tabId).classList.add('active');
}

window.toggleUser = async function(username){
  await loadUsers();
  const u=allUsers.find(x=>x.username===username);
  if(u){u.isActive=u.isActive==='yes'?'no':'yes';await fbSet('users/'+username,u);goPage('admin')}
}

window.deleteUser = async function(username){
  if(!confirm(`Are you sure you want to DELETE manager "@${username}"?\n\nThis action cannot be undone. All their data will remain but they will no longer be able to log in.`)) return;
  try{
    await loadUsers();
    await set(ref(db, 'users/'+username), null);
    goPage('admin');
  }catch(e){alert('Error deleting: '+e.message)}
}

window.createMgr = async function(){
  const username=document.getElementById('cUser').value.trim();
  try{
    await loadUsers();
    if(allUsers.find(u=>u.username===username)){document.getElementById('cMsg').innerHTML='<div class="error-msg">Username exists</div>';return}
    await fbSet('users/'+username,{id:Date.now(),username,password:hashPW(document.getElementById('cPass').value),name:document.getElementById('cName').value.trim(),email:document.getElementById('cEmail').value.trim()||null,role:'manager',isActive:'yes',createdAt:Date.now()});
    document.getElementById('cMsg').innerHTML='<div class="success-msg">Manager created!</div>';
    setTimeout(()=>goPage('admin'),1000);
  }catch(e){document.getElementById('cMsg').innerHTML=`<div class="error-msg">${e.message}</div>`}
}

// ============ MODALS ============
window.openIntModal = async function(intId){
  await loadInteractions();
  const i=allInteractions.find(x=>x.id===intId);
  if(!i)return;
  const remarks=i.remarks||[],activity=i.activityLog||[];
  const sc=i.status==='resolved'?'badge-green':i.status==='pending'?'badge-amber':'badge-red';
  openModal(`<i class="fas fa-comment-dots"></i> @${i.creatorUsername}`,`
    <div class="detail-row"><span class="detail-label">Creator</span><span class="detail-value" style="font-weight:700;font-size:1.1rem">@${i.creatorUsername}</span></div>
    <div class="detail-row"><span class="detail-label">Region</span><span class="detail-value"><span class="badge badge-gray">${i.region}</span></span></div>
    <div class="detail-row"><span class="detail-label">Manager</span><span class="detail-value">${i.managerName||'Unknown'}</span></div>
    <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="badge ${sc}">${i.status}</span></span></div>
    <div class="detail-row"><span class="detail-label">Date</span><span class="detail-value">${new Date(i.createdAt).toLocaleString()}</span></div>
    <div style="margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(255,255,255,.08)">
      <div style="margin-bottom:1rem"><p style="font-size:.75rem;color:#666;text-transform:uppercase;margin-bottom:.25rem">Issue</p><p style="font-size:.9rem;color:#ddd">${i.issue}</p></div>
      <div style="margin-bottom:1rem"><p style="font-size:.75rem;color:#666;text-transform:uppercase;margin-bottom:.25rem">Action</p><p style="font-size:.9rem;color:#ddd">${i.action}</p></div>
      ${i.notes?`<div><p style="font-size:.75rem;color:#666;text-transform:uppercase;margin-bottom:.25rem">Notes</p><p style="font-size:.9rem;color:#888">${i.notes}</p></div>`:''}
    </div>
    ${activity.length?renderActivity(activity):''}
    <div class="remarks-section"><h4><i class="fas fa-comments"></i> Remarks (${remarks.length})</h4>
      ${remarks.length===0?'<p style="color:#666;font-size:.875rem">No remarks yet</p>':remarks.map(r=>`<div class="remark-item"><p>${r.text}</p><div class="remark-meta"><span><i class="fas fa-user"></i> ${r.author}</span><span><i class="far fa-clock"></i> ${new Date(r.time).toLocaleString()}</span></div></div>`).join('')}
      <div class="remark-form"><input type="text" id="intRemarkIn" placeholder="Add remark..." onkeydown="if(event.key==='Enter')addIntRemark(${i.id})"><button class="btn btn-sm btn-green" onclick="addIntRemark(${i.id})"><i class="fas fa-paper-plane"></i></button></div>
    </div>`,`
    ${i.status!=='resolved'?`<button class="btn btn-sm btn-green" onclick="updIntStatus(${i.id},'resolved')">Resolve</button>`:''}
    ${i.status!=='pending'?`<button class="btn btn-sm btn-amber" onclick="updIntStatus(${i.id},'pending')">Pending</button>`:''}
    ${i.status!=='escalated'?`<button class="btn btn-sm btn-red" onclick="updIntStatus(${i.id},'escalated')">Escalate</button>`:''}
    <button class="btn btn-sm btn-secondary" onclick="closeModal()">Close</button>`);
}

window.addIntRemark = async function(intId){
  const input=document.getElementById('intRemarkIn');
  const text=input.value.trim();if(!text)return;
  await loadInteractions();
  const i=allInteractions.find(x=>x.id===intId);
  if(!i)return;
  const remarks=[...(i.remarks||[]),{text,author:currentUser.name,time:Date.now()}];
  const activityLog=[...(i.activityLog||[]),{type:'remark',text:`Remark added`,author:currentUser.name,time:Date.now()}];
  await fbUpdate('interactions/int_'+intId,{remarks,activityLog});
  openIntModal(intId);
}

window.updIntStatus = async function(intId,status){
  await loadInteractions();
  const i=allInteractions.find(x=>x.id===intId);
  if(!i)return;
  const activityLog=[...(i.activityLog||[]),{type:'status',text:`Status changed to "${status}"`,author:currentUser.name,time:Date.now()}];
  await fbUpdate('interactions/int_'+intId,{status,activityLog});
  openIntModal(intId);
}

window.openTaskModal = async function(taskId){
  await loadTasks();await loadUsers();
  const t=allTasks.find(x=>x.id===taskId);
  if(!t)return;
  const assignee=allUsers.find(u=>u.id===t.assignedTo);
  const remarks=t.remarks||[],activity=t.activityLog||[];
  openModal(`<i class="fas fa-tasks"></i> Task Details`,`
    <div class="detail-row"><span class="detail-label">Title</span><span class="detail-value" style="font-weight:700">${t.title}</span></div>
    ${t.description?`<div class="detail-row"><span class="detail-label">Description</span><span class="detail-value">${t.description}</span></div>`:''}
    <div class="detail-row"><span class="detail-label">Assigned</span><span class="detail-value">${assignee?.name||'Unassigned'}</span></div>
    <div class="detail-row"><span class="detail-label">Priority</span><span class="detail-value"><span class="badge badge-${t.priority==='high'?'red':t.priority==='medium'?'amber':'blue'}">${t.priority}</span></span></div>
    <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="badge badge-${t.status==='completed'?'green':t.status==='in_progress'?'blue':'gray'}">${t.status.replace('_',' ')}</span></span></div>
    ${t.dueDate?`<div class="detail-row"><span class="detail-label">Due</span><span class="detail-value">${new Date(t.dueDate).toLocaleDateString()}</span></div>`:''}
    ${activity.length?renderActivity(activity):''}
    <div class="remarks-section"><h4><i class="fas fa-comments"></i> Remarks (${remarks.length})</h4>
      ${remarks.length===0?'<p style="color:#666;font-size:.875rem">No remarks yet</p>':remarks.map(r=>`<div class="remark-item"><p>${r.text}</p><div class="remark-meta"><span><i class="fas fa-user"></i> ${r.author}</span><span><i class="far fa-clock"></i> ${new Date(r.time).toLocaleString()}</span></div></div>`).join('')}
      <div class="remark-form"><input type="text" id="taskRemarkIn" placeholder="Add remark..." onkeydown="if(event.key==='Enter')addTaskRemark(${t.id})"><button class="btn btn-sm btn-green" onclick="addTaskRemark(${t.id})"><i class="fas fa-paper-plane"></i></button></div>
    </div>`,`
    ${t.status!=='in_progress'?`<button class="btn btn-sm btn-blue" onclick="updateTaskStatus(${t.id},'in_progress')">Start</button>`:''}
    ${t.status!=='completed'?`<button class="btn btn-sm btn-green" onclick="updateTaskStatus(${t.id},'completed')">Complete</button>`:''}
    ${t.status==='completed'?`<button class="btn btn-sm" style="background:rgba(255,255,255,.08)" onclick="updateTaskStatus(${t.id},'open')">Reopen</button>`:''}
    <button class="btn btn-sm btn-secondary" onclick="closeModal()">Close</button>`);
}

window.addTaskRemark = async function(taskId){
  const input=document.getElementById('taskRemarkIn');
  const text=input.value.trim();if(!text)return;
  await loadTasks();
  const t=allTasks.find(x=>x.id===taskId);
  if(!t)return;
  const remarks=[...(t.remarks||[]),{text,author:currentUser.name,time:Date.now()}];
  const activityLog=[...(t.activityLog||[]),{type:'remark',text:`Remark added`,author:currentUser.name,time:Date.now()}];
  await fbUpdate('tasks/task_'+taskId,{remarks,activityLog});
  openTaskModal(taskId);
}

function renderActivity(log){
  if(!log||!log.length)return'';
  return`<div class="remarks-section"><h4><i class="fas fa-history" style="color:#FF0050"></i> Activity Log (${log.length})</h4>${log.slice().sort((a,b)=>b.time-a.time).map(e=>{
    const icon=e.type==='created'?'<i class="fas fa-plus-circle" style="color:#10b981"></i>':e.type==='status'?'<i class="fas fa-sync-alt" style="color:#f59e0b"></i>':'<i class="fas fa-comment" style="color:#3b82f6"></i>';
    return`<div class="remark-item" style="border-left:2px solid ${e.type==='created'?'#10b981':e.type==='status'?'#f59e0b':'#3b82f6'};padding-left:.75rem"><div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem"><span style="font-size:.8rem">${icon}</span><span style="font-size:.8rem;color:#aaa">${e.author}</span><span style="font-size:.7rem;color:#666;margin-left:auto">${new Date(e.time).toLocaleString()}</span></div><p style="font-size:.875rem;color:#ddd;margin:0">${e.text}</p></div>`;
  }).join('')}</div>`;
}

function openModal(title,body,footer){
  document.getElementById('modalTitle').innerHTML=title;
  document.getElementById('modalBody').innerHTML=body;
  document.getElementById('modalFooter').innerHTML=footer||'';
  document.getElementById('detailModal').classList.add('active');
}
window.closeModal=function(){document.getElementById('detailModal').classList.remove('active')}
